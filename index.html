  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

  </script>

55,77,160,.32); font-size:13.5px; color:#FFB3D6;\">\n          <span style=\"width: 7px; height: 7px; border-radius: 50%; background: rgb(255, 77, 160); animation: 2.4s ease 0s infinite normal none running badgePulse;\"><\u002Fspan> Open to speaking, side projects, and potentially the right new role (outside my federal work)<\u002Fdiv>\n\n                <div style=\"display:flex; flex-wrap:wrap; justify-content:center; gap:12px; margin-top:36px;\">\n          <a href=\"mailto:juliettegudknecht14@gmail.com\" style=\"text-decoration:none; padding:13px 26px; border-radius:99px; background:#FF4DA0; color:#190A11; font-weight:600; font-size:15px; transition:transform .2s, box-shadow .2s;\" style-hover=\"transform:translateY(-3px); box-shadow:0 14px 34px -14px rgba(255,77,160,.9);\">Get in touch<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/juliettegudknecht/\" target=\"_blank\" style=\"text-decoration:none; padding:13px 26px; border-radius:99px; border:1px solid rgba(255,255,255,.16); color:#F4E8EF; font-size:15px; transition:border-color .2s, transform .2s;\" style-hover=\"border-color:rgba(255,77,160,.5); transform:translateY(-3px);\">LinkedIn<\u002Fa>\n          <a href=\"https://scholar.google.com/citations?user=ddCdV7wAAAAJ&amp;hl=en\" target=\"_blank\" style=\"text-decoration:none; padding:13px 26px; border-radius:99px; border:1px solid rgba(255,255,255,.16); color:#F4E8EF; font-size:15px; transition:border-color .2s, transform .2s;\" style-hover=\"border-color:rgba(255,77,160,.5); transform:translateY(-3px);\">Google Scholar<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"stats\" style=\"padding:34px 0 14px;\">\n      <div style=\"display:flex; flex-wrap:wrap; justify-content:center; max-width:780px; margin:0 auto; border-top:1px solid rgba(255,255,255,.08); border-bottom:1px solid rgba(255,255,255,.08);\">\n        <div style=\"flex:1 1 160px; padding:24px 18px; text-align:center;\">\n          <div style=\"font-size:34px; font-weight:700; color:#F4E8EF; letter-spacing:-.02em;\"><span data-count=\"46\">0<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:7px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#7A7274; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">citations<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 160px; padding:24px 18px; text-align:center; border-left:1px solid rgba(255,255,255,.06);\">\n          <div style=\"font-size:34px; font-weight:700; color:#F4E8EF; letter-spacing:-.02em;\"><span data-count=\"10\">0<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:7px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#7A7274; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">publications<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 160px; padding:24px 18px; text-align:center; border-left:1px solid rgba(255,255,255,.06);\">\n          <div style=\"font-size:34px; font-weight:700; color:#F4E8EF; letter-spacing:-.02em;\"><span data-count=\"1200\">0<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:7px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#7A7274; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">keynote reach<\u002Fdiv>\n        <\u002Fdiv>\n        <div style=\"flex:1 1 160px; padding:24px 18px; text-align:center; border-left:1px solid rgba(255,255,255,.06);\">\n          <div style=\"font-size:34px; font-weight:700; color:#F4E8EF; letter-spacing:-.02em;\"><span data-count=\"8\">0<\u002Fspan><span style=\"color:#FF4DA0;\">M+<\u002Fspan><\u002Fdiv>\n          <div style=\"margin-top:7px; font-size:11px; letter-spacing:.12em; text-transform:uppercase; color:#7A7274; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">students with disabilities affected<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"research\" style=\"padding:64px 0;\">\n      <div style=\"border:1px 02Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <section id=\"work\" style=\"padding:64px 0;\">\n      <h2 style=\"text-align:center; margin:0 0 44px; font-size:13px; letter-spacing:.2em; text-transform:uppercase; color:#8E8688; font-weight:600; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">Career journey<\u002Fh2>\n      <div style=\"position:relative; padding-left:32px;\">\n        <div style=\"position:absolute; left:6px; top:8px; bottom:8px; width:2px; background:linear-gradient(180deg,#FF4DA0,rgba(255,77,160,.08));\"><\u002Fdiv>\n        <sc-for list=\"{{ experience }}\" as=\"job\" hint-placeholder-count=\"6\">\n          <div style=\"position:relative; padding-bottom:30px;\">\n            <div style=\"position:absolute; left:-32px; top:4px; width:14px; height:14px; border-radius:50%; background:#190A11; border:3px solid #FF4DA0;\"><\u002Fdiv>\n            <div style=\"border:1px solid rgba(255,150,200,.12); border-radius:18px; padding:22px 24px; background:rgba(255,150,200,.022); transition:border-color .25s, box-shadow .25s, transform .25s;\" style-hover=\"transform:translateX(4px); border-color:rgba(255,77,160,.35); box-shadow:0 16px 40px -28px rgba(255,77,160,.6);\">\n              <div style=\"display:flex; flex-wrap:wrap; justify-content:space-between; gap:10px; align-items:baseline;\">\n                <span style=\"display:inline-flex; align-items:center; gap:9px; flex-wrap:wrap;\"><span style=\"font-size:17.5px; font-weight:600; color:#F4E8EF;\">{{ job.role }}<\u002Fspan><sc-if value=\"{{ job.current }}\" hint-placeholder-val=\"{{ false }}\"><span style=\"font-size:10px; letter-spacing:.1em; text-transform:uppercase; padding:3px 9px; border-radius:99px; background:rgba(255,77,160,.16); border:1px solid rgba(255,77,160,.4); color:#FF8AC4; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">Current role<\u002Fspan><\u002Fsc-if><\u002Fspan>\n                <span style=\"font-size:13px; color:#FF8AC4;\">{{ job.years }}<\u002Fspan>\n ze:12.5px; color:#8E8688; margin-top:3px;\">Posed autism-advocacy questions to international leaders at United Nations Headquarters.<\u002Fdiv><div class=\"a11y-cap\">Image: Juliette Gudknecht at the International Day of Education at United Nations Headquarters.<\u002Fdiv><\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://www.youtube.com/watch?v=aCb8njOc7mM\" target=\"_blank\" style=\"text-decoration:none; display:block; border-radius:14px; overflow:hidden; border:1px solid rgba(255,150,200,.14); background:rgba(255,150,200,.022); transition:border-color .25s, transform .2s;\" style-hover=\"border-color:rgba(255,77,160,.5); transform:translateY(-3px);\">\n          <div style=\"position:relative; aspect-ratio:16/9; background:#000;\">\n            <img src=\"e8fdf3e1-d031-4cf8-a8a4-073b912fba48\" alt=\"Juliette Gudknecht presenting at the 2024 Neurodiversity Awareness Day at Columbia University\" loading=\"lazy\" style=\"display:block; width:100%; height:100%; object-fit:cover;\">\n            <span aria-hidden=\"true\" style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center;\"><span style=\"width:44px; height:44px; border-radius:50%; background:rgba(25,10,17,.66); border:1px solid rgba(255,255,255,.45); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; padding-left:3px;\">▶<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:12px 14px;\"><div style=\"font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#FF8AC4; margin-bottom:5px; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">Columbia · 2024<\u002Fdiv><div style=\"font-size:14.5px; font-weight:600; color:#F4E8EF; line-height:1.3;\">Introduction to Neurodiversity<\u002Fdiv><div style=\"font-size:12.5px; color:#8E8688; margin-top:3px;\">The annual Neurodiversity Awareness Day at Columbia University (2024).<\u002Fdiv><div class=\"a11y-cap\">Image: Juliette Gudknecht presenting at the 2024 Neurodiversity Awareness Day at Columbia University.<\u002Fdiv><\u002Fdiv>\n        <\u002Fa>\n        <a href=\"https://www.youtube.com/watch?v=eTpnZxUKjWw\" target=\"_blank\" style=\"text-decoration:none; display:block; border-radius:14px; overflow:hidden; border:1px solid rgba(255,150,200,.14); background:rgba(255,150,200,.022); transition:border-color .25s, transform .2s;\" style-hover=\"border-color:rgba(255,77,160,.5); transform:translateY(-3px);\">\n          <div style=\"position:relative; aspect-ratio:16/9; background:#000;\">\n            <img src=\"70f779c0-2010-48c1-a7c0-b1ea28f041e4\" alt=\"Juliette Gudknecht co-hosting the 2023 Neurodiversity Awareness Day at Columbia University\" loading=\"lazy\" style=\"display:block; width:100%; height:100%; object-fit:cover;\">\n            <span aria-hidden=\"true\" style=\"position:absolute; inset:0; display:flex; align-items:center; justify-content:center;\"><span style=\"width:44px; height:44px; border-radius:50%; background:rgba(25,10,17,.66); border:1px solid rgba(255,255,255,.45); display:flex; align-items:center; justify-content:center; color:#fff; font-size:13px; padding-left:3px;\">▶<\u002Fspan><\u002Fspan>\n          <\u002Fdiv>\n          <div style=\"padding:12px 14px;\"><div style=\"font-size:11px; letter-spacing:.06em; text-transform:uppercase; color:#FF8AC4; margin-bottom:5px; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">Columbia · 2023<\u002Fdiv><div style=\"font-size:14.5px; font-weight:600; color:#F4E8EF; line-height:1.3;\">Neurodiversity Awareness Day opening<\u002Fdiv><div style=\"font-size:12.5px; color:#8E8688; margin-top:3px;\">Co-hosted the 2023 event at Columbia University with Ara Bakhteyar.<\u002Fdiv><div class=\"a11y-cap\">Image: Juliette Gudknecht co-hosting the 2023 Neurodiversity Awareness Day at Columbia University.<\u002Fdiv><\u002Fdiv>\n        <\u002Fa>\n        <a href=\"mailto:juliettegudknecht14@gmail.com?subject=Speaking%20invitation\" style=\"text-decoration:none; d 9);\">Email me<\u002Fa>\n          <a href=\"https://www.linkedin.com/in/juliettegudknecht/\" target=\"_blank\" style=\"text-decoration:none; padding:14px 26px; border-radius:99px; border:1px solid rgba(255,255,255,.18); color:#F4E8EF; font-size:15px;\">LinkedIn ↗<\u002Fa>\n          <a href=\"https://scholar.google.com/citations?user=ddCdV7wAAAAJ&amp;hl=en\" target=\"_blank\" style=\"text-decoration:none; padding:14px 26px; border-radius:99px; border:1px solid rgba(255,255,255,.18); color:#F4E8EF; font-size:15px;\">Scholar ↗<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div style=\"display:flex; flex-direction:column; align-items:center; gap:12px; margin-top:36px;\">\n        <div style=\"display:flex; align-items:center; gap:16px; font-size:12.5px;\">\n          <button onclick=\"{{ openPrivacy }}\" style=\"background:none; border:none; padding:0; font-family:'Hanken Grotesk',sans-serif; font-size:12.5px; color:#A39A9C; cursor:pointer; transition:color .2s;\" style-hover=\"color:#FF8AC4;\">Privacy<\u002Fbutton>\n          <span style=\"color:#3F393B;\">·<\u002Fspan>\n          <a href=\"mailto:juliettegudknecht14@gmail.com\" style=\"text-decoration:none; color:#A39A9C; transition:color .2s;\" style-hover=\"color:#FF8AC4;\">Contact<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"font-size:12.5px; color:#5E5658;\">© 2026 Juliette Gudknecht · views my own<\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n  <\u002Fmain>\n<\u002Fdiv>\n  <div style=\"position:fixed; right:18px; bottom:18px; z-index:90;\">\n    <button onclick=\"{{ togglePanel }}\" aria-expanded=\"{{ a11yOpen }}\" aria-label=\"Accessibility options\" style=\"display:flex; align-items:center; gap:8px; padding:11px 15px; border-radius:99px; border:1px solid rgba(255,77,160,.45); background:#17131c; color:#F4E8EF; font-family:'Hanken Grotesk',sans-serif; font-size:13.5px; font-weight:600; cursor:pointer; box-shadow:0 12px 34px -14px rgba(0,0,0,.8);\"><span aria-hidden=\"true\" style=\"font-size:16px;\">♿<\u002Fspan> Accessibility options<\u002Fbutton>\n    <sc-if value=\"{{ a11yOpen }}\" hint-placeholder-val=\"{{ false }}\">\n      <div role=\"group\" aria-label=\"Accessibility settings\" style=\"position:absolute; right:0; bottom:54px; width:250px; padding:14px; border-radius:16px; border:1px solid rgba(255,180,210,.2); background:#17131c; box-shadow:0 24px 60px -20px rgba(0,0,0,.85); display:flex; flex-direction:column; gap:8px;\">\n        <div style=\"display:flex; align-items:center; justify-content:space-between; gap:10px; margin-bottom:4px;\"><span style=\"font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:#8E8688; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">Accessibility<\u002Fspan><button onclick=\"{{ resetA11y }}\" aria-label=\"Reset accessibility settings\" style=\"font-family:'Hanken Grotesk',sans-serif; font-size:11.5px; color:#FF8AC4; background:none; border:none; cursor:pointer; padding:2px 4px;\">Reset<\u002Fbutton><\u002Fdiv><div style=\"font-size:11.5px; color:#8E8688; line-height:1.4; margin-bottom:4px;\">Your choices are saved on this device.<\u002Fdiv>\n        <button class=\"a11y-tog\" onclick=\"{{ tLight }}\" aria-pressed=\"{{ aLight }}\">Light mode <span class=\"a11y-knob\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <button class=\"a11y-tog\" onclick=\"{{ tMotion }}\" aria-pressed=\"{{ aMotion }}\">Reduce motion <span class=\"a11y-knob\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <button class=\"a11y-tog\" onclick=\"{{ tPlain }}\" aria-pressed=\"{{ aPlain }}\">Plain language <span class=\"a11y-knob\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <button class=\"a11y-tog\" onclick=\"{{ tLarge }}\" aria-pressed=\"{{ aLarge }}\">Larger text <span class=\"a11y-knob\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <button class=\"a11y-tog\" onclick=\"{{ tContrast }}\" aria-pressed=\"{{ aContrast }}\">High contrast <span class=\"a11y-knob\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <button class=\"a11y-tog\" onclick=\"{{ tFont }}\" aria-pressed=\"{{ aFont }}\">Readable font <span class=\"a11y-knob\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <button class=\"a11y-tog\" onclick=\"{{ tLinks }}\" aria-pressed=\"{{ aLinks }}\">Underline links <span class=\"a11y-knob\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n        <button class=\"a11y-tog\" onclick=\"{{ tCaptions }}\" aria-pressed=\"{{ aCaptions }}\">Image captions <span class=\"a11y-knob\" aria-hidden=\"true\"><\u002Fspan><\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Fsc-if>\n  <\u002Fdiv>\n  <sc-if value=\"{{ privacyOpen }}\" hint-placeholder-val=\"{{ false }}\">\n    <div onclick=\"{{ closePrivacy }}\" role=\"dialog\" aria-modal=\"true\" aria-label=\"Privacy policy\" style=\"position:fixed; inset:0; z-index:100; display:flex; align-items:center; justify-content:center; padding:24px; background:rgba(12,6,9,.7); backdrop-filter:blur(6px); -webkit-backdrop-filter:blur(6px);\">\n      <div onclick=\"{{ stop }}\" style=\"position:relative; width:100%; max-width:540px; max-height:86vh; overflow:auto; border-radius:22px; border:1px solid rgba(255,150,200,.14); background:#190A11; box-shadow:0 30px 80px -24px rgba(0,0,0,.8); padding:34px 34px 30px;\">\n        <button onclick=\"{{ closePrivacy }}\" aria-label=\"Close\" style=\"position:absolute; top:16px; right:16px; width:32px; height:32px; border-radius:50%; border:1px solid rgba(255,150,200,.22); background:rgba(255,150,200,.035); color:#F4E8EF; font-size:15px; cursor:pointer; line-height:1;\">×<\u002Fbutton>\n        <div style=\"font-size:11px; letter-spacing:.18em; text-transform:uppercase; color:#FF8AC4; font-family:ui-monospace,'SF Mono',Menlo,monospace;\">Privacy<\u002Fdiv>\n        <h2 style=\"margin:10px 0 4px; font-size:26px; font-weight:700; letter-spacing:-.02em; color:#F4E8EF;\">Privacy policy<\u002Fh2>\n        <div style=\"font-size:12.5px; color:#8E8688; margin-bottom:18px;\">Last updated June 2026<\u002Fdiv>\n        <div style=\"display:flex; flex-direction:column; gap:15px; font-size:14.5px; line-height:1.65; color:#BDB4B6;\">\n          <p style=\"margin:0;\">This is a personal portfolio site. It does <strong style=\"color:#F4E8EF;\">not collect personal information<\u002Fstrong>, run analytics or advertising trackers, or set tracking cookies.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#F4E8EF;\">On-device settings.<\u002Fstrong> If you change the accessibility options (reduce motion, larger text, and so on), those choices are stored only in your own browser using local storage so the site remembers them on your next visit. They never leave your device and are never sent anywhere. You can clear them anytime with the “Reset” button in the accessibility panel.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#F4E8EF;\">Contact &amp; links.<\u002Fstrong> If you email me, I receive whatever you choose to send (your name, email address, and message) and use it only to reply. This site also links to outside services like LinkedIn, Google Scholar, and YouTube. Once you follow a link, that service runs under its own privacy policy, not mine.<\u002Fp>\n          <p style=\"margin:0;\"><strong style=\"color:#F4E8EF;\">Questions?<\u002Fstrong> Email <a href=\"mailto:juliettegudknecht14@gmail.com\" style=\"color:#FF8AC4; text-decoration:none;\">juliettegudknecht14@gmail.com<\u002Fa>. Views expressed here are my own and not those of my employer.<\u002Fp>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fsc-if>\n<\u002Fx-dc>\n<script type=\"text/x-dc\" data-dc-script=\"\" data-props=\"{&quot;$preview&quot;:{&quot;width&quot;:1000,&quot;height&quot;:900}}\">\nclass Component extends DCLogic {\n  state = { filter: 'All', a11y: { motion: false, large: false, contrast: false, font: false, links: false, light: false, captions: false, plain: false }, a11yOpen: false, privacyOpen: false };\n  _rootRef = (el) => { this._root = el; };\n  _lastFilter = null;\n  _chips = null;\n  _filtered = null;\n  _togglePanel = () => this.setState(s => ({ a11yOpen: !s.a11yOpen }));\n  _openPrivacy = () => this.setState({ privacyOpen: true });\n  _closePrivacy = () => this.setState({ privacyOpen: false });\n  _stop = (e) => { e.stopPropagation(); };\n  _a11y = (k) => () => this.setState(s => { const a = { ...s.a11y, [k]: !s.a11y[k] }; try { localStorage.setItem('jg_a11y', JSON.stringify(a)); } catch (e) {} return { a11y: a }; });\n  _resetA11y = () => { try { localStorage.removeItem('jg_a11y'); } catch (e) {} this.setState({ a11y: { motion: false, large: false, contrast: false, font: false, links: false, light: false, captions: false, plain: false } }); };\n\n  allProjects = [\n    { title: 'Language Use in Autism Research', org: 'Published in Autism (SAGE)', tags: ['Research'], desc: 'Systematic analysis of 12,962 abstracts across 11 autism journals, tracing the shift from person-first to identity-first language.', metric: 'peer-reviewed · Zajic & Gudknecht, 2024' },\n    { title: 'Special Education Goals of Autistic Students', org: 'Published in Exceptional Children', tags: ['Research'], desc: 'Latent class analysis of IEP goals with demographic and developmental covariates, mapping how educational needs cluster.', metric: 'peer-reviewed · Zajic, Gudknecht & McIntyre, 2025' },\n    { title: 'IDEA Section 618 Data Collections', org: 'U.S. Department of Education, Office of Special Education Programs', tags: ['Data Viz','UX','Policy & Advocacy'], desc: 'Lead the 2023\\u201324 and 2024\\u201325 Discipline and Personnel collections and their static tables, and support the MOE/CEIS, Assessment, and Part C Child Count collections. QC, validation, and Section 508-accessible public displays.', metric: 'Discipline · Personnel · static tables' },\n    { title: 'OSEP Fast Facts', org: 'U.S. Department of Education, Office of Special Education Programs', tags: ['Data Viz','UX'], desc: 'Authored the four most recent OSEP Fast Facts releases, turning IDEA Section 618 data into accessible, Section 508-compliant data stories for the public.', metric: 'last 4 releases · Section 508' },\n    { title: 'IDEA Annual Report to Congress', org: 'U.S. Department of Education, Office of Special Education Programs', tags: ['Data Viz','Policy & Advocacy'], desc: 'Contributed Section 618 data to, and served on the team responsible for, the IDEA Annual Report to Congress, the federal government\\u2019s yearly report on the state of special education in the United States.', metric: '2025 edition · federal report' },\n    { title: 'Python QC & Automation Toolkit', org: 'U.S. Department of Education, Office of Special Education Programs', tags: ['Machine Learning','AI / GenAI','Data Viz'], desc: 'Built Python automation for scoring-report parsing and quality-control checks, plus reusable Section 508-compliant reporting templates adopted across the division.', metric: 'adopted division-wide' },\n    { title: 'Searching for Life on Exoplanets', org: 'NASA · Goddard', tags: ['Machine Learning','Research'], desc: 'Contributed to a project for a random-forest pipeline to detect chemical biosignatures in exoplanet spectra as part of the search for life.', metric: 'random forest · spectral classification' },\n    { title: 'Hubble Social Analytics', org: 'NASA', tags: ['Data Viz','UX','Research'], desc: 'Built an R + Data Studio dashboard with ARIMA forecasting. Insights reshaped strategy and broke the team record for post impressions.', metric: 'ARIMA · still in active use' },\n    { title: 'Population Health Regressions', org: 'Geisinger', tags: ['Machine Learning','Research'], desc: 'Ran regressions across 90,000 patient records on autism-linked genetic disorders, plus COVID-19 supply and trend forecasting.', metric: '90K patients · presented at conference' },\n    { title: 'Visa Outcome Prediction Engine', org: 'U.S. Department of State (intern)', tags: ['Machine Learning','AI / GenAI'], desc: 'Developed the data-scraping and modeling logic for a neural network predicting visa application outcomes; led the intern team through validation.', metric: 'neural network · led validation team' },\n    { title: 'Kepler Light-Curve Analysis', org: 'NASA · Kepler', tags: ['Research'], desc: 'Interpolated gaps and ran Fourier transforms on stellar time-series data from the Kepler Space Telescope.', metric: 'Fourier analysis · 4 conferences' },\n    { title: 'Neurodiversity Awareness Day', org: 'Autism & Neurodivergency Advocacy Assn.', tags: ['Policy & Advocacy'], desc: 'Produced a 300+ attendee event with Columbia advancing neurodiversity inclusion, education, and community.', metric: '300+ attendees · community-led' },\n  ];\n\n  experienceData = [\n    { years: '2024\\u2013Now', role: 'Data Analyst (Education Program Specialist)', org: 'U.S. Department of Education, Office of Special Education Programs', current: true, desc: 'I serve as the data steward and subject-matter expert for Individuals with Disabilities Education Act (IDEA) Section 618 reporting: the federal data that every U.S. state submits each year on the infants, children, and students it serves in special education. My work spans six national data collections that shape how the country understands and funds services for students with disabilities. (Views my own, not my employer\\u2019s.)', hasHighlights: true, highlights: [\n      { pre: 'Run the ', hi: 'IDEA Discipline (2023\\u201324, 2024\\u201325) and Personnel (2024\\u201325) collections', post: ' and their static tables. In plain terms: the Discipline data tracks how often students with disabilities are suspended, expelled, or removed from class, and the Personnel data counts the special-education teachers and staff who serve them. Together they give a clear national picture of how students with disabilities are served.' },\n      { pre: 'The collections I work on affect ', hi: '8M+ students with disabilities', post: ': I assist regularly on the Assessment collection (state-test performance) and on Maintenance of Effort and Coordinated Early Intervening Services (MOE/CEIS), and have previously assisted with the Exiting, Child Count, and Educational Environments collections.' },\n      { pre: 'Co-authored the ', hi: 'four most recent OSEP Fast Facts releases', post: ', turning IDEA Section 618 data into accessible, Section 508-compliant data stories for the public.' },\n      { pre: 'Contributed data to and served on the team responsible for the ', hi: 'IDEA Annual Report to Congress', post: ', the federal government’s yearly report on the state of special education across the United States.' },\n      { pre: 'Built ', hi: 'Python automation', post: ' for data-quality checks and validation, plus reusable Section 508-compliant templates now used across the Office of Special Education Programs.' },\n      { pre: 'Represent the Office of Special Education Programs on ', hi: 'two federal data-governance boards', post: ': the EDFacts Data Governance Board and the Office of Planning, Evaluation and Policy Development (OPEPD) Data Literacy Workgroup.' },\n      { pre: 'Oversee ', hi: '15 grants worth more than $20M a year', post: ', including two national special-education data centers.' },\n      { pre: 'Co-delivered a keynote to ', hi: '1,200 people', post: ' at the OSEP Leadership Conference, with additional talks at the DaSy Center and Center for IDEA Fiscal Reporting (CIFR).' },\n      { pre: 'Member of the ', hi: 'Federal Interagency Working Group on Autism (FIWA)', post: ', which coordinates autism research and services across United States agencies.' }\n    ] },\n    { years: '2021\\u2013Now', role: 'Founder & CEO', org: 'Autism & Neurodivergency Advocacy Association', desc: 'Founder and Chief Executive Officer of a 501(c)(3) nonprofit advancing neurodiversity through research, education, and international partnerships. Produced a Neurodiversity Awareness Day with Columbia University that drew more than 300 attendees.' },\n    { years: '2021\\u201324', role: 'Graduate Research Fellow', org: 'Teachers College, Columbia University', desc: 'Conducted quantitative and qualitative research on autism and special education, co-authoring peer-reviewed studies published in Autism and Exceptional Children.' },\n    { years: '2023\\u201325', role: 'Inclusive Education Co-Chair', org: 'UNESCO · Sustainable Development Goal 4 Youth & Student Network', desc: 'Selected from more than 1,500 applicants to represent youth in global education policy. Authored policy briefs and led trainings on disability inclusion at international forums.' },\n    { years: '2023\\u201324', role: 'International Disability Rights Intern', org: 'U.S. Department of State', desc: 'Supported the Office of International Disability Rights on a narrative-change initiative advancing the human rights of people with disabilities, coordinating across public affairs and diplomatic channels.' },\n    { years: '2022', role: 'Data Science / Analytics Intern', org: 'NASA · Goddard Space Flight Center', desc: 'Applied random-forest and ARIMA (time-series) models to exoplanet and social-media analytics, and built dashboards that the Hubble Space Telescope team continues to use.' },\n    { years: '2021', role: 'Data Science Intern', org: 'Geisinger', desc: 'Built regression models across 90,000 patient records to study autism and co-occurring genetic disorders, and produced COVID-19 forecasting to support operational planning.' },\n    { years: '2019\\u201320', role: 'Computational Astrophysics Researcher', org: 'NASA Kepler · Bloomsburg University', desc: 'Led an independent study of NASA Kepler Space Telescope time-series data using Fourier analysis, presenting findings at four academic conferences.' },\n  ];\n\n  educationData = [\n    { degree: 'MS, Applied Statistics', school: 'Columbia University', year: '2021\\u20132023' },\n    { degree: 'BS, Physics & Data Science', school: 'Bloomsburg University of Pennsylvania', year: '2018\\u20132021' },\n    { degree: 'Summer Program, Physics', school: 'Princeton University', year: 'Summer' },\n  ];\n\n  renderVals() {\n    const filters = ['All','Research','Machine Learning','AI / GenAI','Data Viz','UX','Policy & Advocacy'];\n    const active = this.state.filter;\n    if (this._lastFilter !== active) {\n      this._lastFilter = active;\n      const base = { fontFamily:\"'Hanken Grotesk',sans-serif\", fontSize:'13.5px', padding:'9px 17px', borderRadius:'99px', cursor:'pointer', border:'1px solid rgba(255,255,255,.14)', background:'transparent', color:'#A39A9C', transition:'all .2s' };\n      const on = { fontFamily:\"'Hanken Grotesk',sans-serif\", fontSize:'13.5px', padding:'9px 17px', borderRadius:'99px', cursor:'pointer', border:'1px solid #FF4DA0', background:'#FF4DA0', color:'#190A11', fontWeight:600, transition:'all .2s' };\n      this._chips = filters.map(f => ({ label: f, style: active === f ? on : base, on: () => this.setState({ filter: f }) }));\n      this._filtered = active === 'All' ? this.allProjects : this.allProjects.filter(p => p.tags.includes(active));\n    }\n    const a = this.state.a11y;\n    return { rootRef: this._rootRef, chips: this._chips, filteredProjects: this._filtered, experience: this.experienceData, education: this.educationData,\n      a11yAttr: Object.keys(a).filter(k => a[k]).join(' '), a11yOpen: this.state.a11yOpen, togglePanel: this._togglePanel,\n      privacyOpen: this.state.privacyOpen, openPrivacy: this._openPrivacy, closePrivacy: this._closePrivacy, stop: this._stop,\n      tMotion: this._a11y('motion'), aMotion: a.motion, tLarge: this._a11y('large'), aLarge: a.large,\n      tContrast: this._a11y('contrast'), aContrast: a.contrast, tFont: this._a11y('font'), aFont: a.font,\n      tLinks: this._a11y('links'), aLinks: a.links, tLight: this._a11y('light'), aLight: a.light, tCaptions: this._a11y('captions'), aCaptions: a.captions, tPlain: this._a11y('plain'), aPlain: a.plain, resetA11y: this._resetA11y };\n  }\n\n  componentDidMount() {\n    try { const saved = JSON.parse(localStorage.getItem('jg_a11y') || 'null'); if (saved) this.setState(s => ({ a11y: { ...s.a11y, ...saved } })); } catch (e) {}\n    requestAnimationFrame(() => this.initAnims());\n  }\n\n  componentWillUnmount() {\n    clearTimeout(this._t1); clearTimeout(this._t2); clearTimeout(this._typeT);\n    if (this._onMove) window.removeEventListener('mousemove', this._onMove);\n  }\n\n  initAnims() {\n    const root = this._root;\n    if (!root) return;\n    const reduce = window.matchMedia && window.matchMedia('(prefers-reduced-motion: reduce)').matches;\n\n    const typedEl = root.querySelector('[data-typed]');\n    if (typedEl) {\n      const words = ['neurodiversity', 'accessible data', 'inclusive education', 'disability rights'];\n      if (reduce) { typedEl.textContent = words[0]; }\n      else {\n        let wi = 0, ci = 0, del = false;\n        const tick = () => {\n          const w = words[wi];\n          ci += del ? -1 : 1;\n          typedEl.textContent = w.slice(0, ci);\n          let d = del ? 45 : 95;\n          if (!del && ci === w.length) { d = 1400; del = true; }\n          else if (del && ci === 0) { del = false; wi = (wi + 1) % words.length; d = 320; }\n          this._typeT = setTimeout(tick, d);\n        };\n        this._typeT = setTimeout(tick, 600);\n      }\n    }\n\n    // On-scroll fills (enhancement) when supported and painting\n    if (typeof IntersectionObserver !== 'undefined') {\n      const io = new IntersectionObserver((entries) => {\n        entries.forEach(e => { if (e.isIntersecting) { e.target.style.width = e.target.dataset.target + '%'; io.unobserve(e.target); } });\n      }, { threshold: 0.25 });\n      root.querySelectorAll('[data-skill-fill]').forEach(el => io.observe(el));\n      const io2 = new IntersectionObserver((entries) => {\n        entries.forEach(e => { if (e.isIntersecting) { this.countUp(e.target); io2.unobserve(e.target); } });\n      }, { threshold: 0.5 });\n      root.querySelectorAll('[data-count]').forEach(el => io2.observe(el));\n    }\n\n    // Guaranteed fallback (timers fire even when the page is not painting / observers never trigger)\n    this._t1 = setTimeout(() => {\n      root.querySelectorAll('[data-skill-fill]').forEach(el => {\n        if (parseFloat(el.style.width) > 0) return;\n        if (reduce) el.style.transition = 'none';\n        el.style.width = el.dataset.target + '%';\n      });\n    }, reduce ? 0 : 1800);\n    this._t2 = setTimeout(() => {\n      root.querySelectorAll('[data-count]').forEach(el => {\n        const cur = parseInt((el.textContent || '0').replace(/\\D/g, ''), 10) || 0;\n        if (cur === 0) el.textContent = Number(el.dataset.count).toLocaleString();\n      });\n    }, reduce ? 0 : 2000);\n\n    // Cursor parallax on the infinity motif\n    if (!reduce) {\n      this._onMove = (ev) => {\n        const layer = root.querySelector('#ndParallax');\n        if (!layer) return;\n        const dx = (ev.clientX - window.innerWidth / 2) * 0.02;\n        const dy = (ev.clientY - window.innerHeight / 2) * 0.02;\n        layer.style.transform = 'translate(' + dx + 'px,' + dy + 'px)';\n      };\n      window.addEventListener('mousemove', this._onMove, { passive: true });\n    }\n  }\n\n  countUp(el) {\n    const target = parseFloat(el.dataset.count);\n    const dur = 1300;\n    const start = performance.now();\n    const step = (now) => {\n      const t = Math.min(1, (now - start) / dur);\n      const eased = 1 - Math.pow(1 - t, 3);\n      el.textContent = Math.round(target * eased).toLocaleString();\n      if (t < 1) requestAnimationFrame(step);\n      else el.textContent = Math.round(target).toLocaleString();\n    };\n    requestAnimationFrame(step);\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
